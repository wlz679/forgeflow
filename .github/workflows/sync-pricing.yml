name: Sync AI Pricing

# Weekly cron + manual trigger
# Pulls latest LLM pricing from LiteLLM and updates src/data/ai-pricing.json
# If changes are detected, commits and pushes to the current branch.

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC = 14:00 Beijing
  workflow_dispatch: # Manual trigger
  push:
    paths:
      - 'src/data/ai-pricing.json'
      - 'scripts/sync-pricing.mjs'
      - '.github/workflows/sync-pricing.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run sync
        run: node scripts/sync-pricing.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/ai-pricing.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ai-pricing.json
          git commit -m "chore(pricing): sync from LiteLLM ($(date -u +%Y-%m-%d))"
          git push
