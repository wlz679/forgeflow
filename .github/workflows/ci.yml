name: CI

on:
  pull_request:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.superpowers/**'

jobs:
  build:
    name: Drift checks + build
    runs-on: ubuntu-latest
    # P24: bumped from 10 to 30 — P23b wired RUN_BUILD_TESTS=1 into the
    # Unit tests step, which triggers 5 build-dependent test files × ~3min
    # each + satori prebuild. Observed local wall-clock ≈ 21+min, so 10min
    # was insufficient and would have killed CI mid-suite.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Drift check (staticExamples)
        run: pnpm check:examples

      - name: Drift check (customFn data tables)
        run: pnpm check:customfn

      - name: Check engine coverage (P53)
        run: pnpm check:engine-coverage

      - name: Type check (fail-fast gate — P53)
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        env:
          # P24: P23b skip-guard design assumes CI opt-in. Without this,
          # the 5 build-dependent test files (baselayout-clerk-script,
          # baselayout-sync-script, header-clerk-render, header-sync-ui,
          # privacy-policy-sync) silently early-return and don't run.
          RUN_BUILD_TESTS: '1'
        run: pnpm test:unit

      - name: Build
        run: pnpm build
